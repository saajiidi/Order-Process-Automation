name: Update Daily Data

on:
  schedule:
    - cron: '0 6 * * *' # Runs every day at 6 AM UTC
  workflow_dispatch:     # Allows manual trigger from GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: |
          pip install pandas pyarrow openpyxl requests
          
      - name: Fetch and update data
        env:
          GSHEET_URL: ${{ secrets.GSHEET_URL }}
        run: python update_script.py
        
      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/year=2026/data.parquet
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update 2026 data from Google Sheet [$(date +%Y-%m-%d)]" && git push)
